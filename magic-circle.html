<div style="background:#000; padding:2rem 1rem; display:flex; flex-direction:column; align-items:center; border-radius:12px;">
<svg width="260" height="180" viewBox="0 0 260 180" style="filter:drop-shadow(0 0 6px rgba(61,255,125,0.5));">
<polyline id="morph" fill="none" stroke="#3dff7d" stroke-width="2"/>
<circle id="spark" cx="130" cy="90" r="4" fill="#aaffcc" opacity="0"/>
</svg>
</div>
<script>
(function(){
var N=120;
var cx=130, cy=90;

// Shape A: circle
var circlePts=[];
for(var i=0;i<=N;i++){
var t=(i/N)*2*Math.PI;
circlePts.push([cx+45*Math.cos(t), cy+45*Math.sin(t)]);
}

// Shape B: horizontal infinity (lemniscate), traced so point[0] and point[N] both
// sit at the center crossing, matching circle's natural start/end continuity
var infPts=[];
for(var i=0;i<=N;i++){
var t=(i/N)*2*Math.PI;
var scale=45;
var x=scale*Math.sin(t);
var y=scale*Math.sin(t)*Math.cos(t);
infPts.push([cx+x, cy+y]);
}

var rightCenterLocal=[27,0];

function lerp(a,b,t){return a+(b-a)*t;}
function easeInOutCubic(t){return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;}

var morph=document.getElementById('morph');
var spark=document.getElementById('spark');
var duration=2600; // ms for the twist
var startTime=null;
var morphDone=false;

function drawMorph(progress){
var e=easeInOutCubic(progress);
var str='';
for(var i=0;i<=N;i++){
var x=lerp(circlePts[i][0], infPts[i][0], e);
var y=lerp(circlePts[i][1], infPts[i][1], e);
str+=x.toFixed(1)+','+y.toFixed(1)+' ';
}
morph.setAttribute('points',str);
}

function frame(ts){
if(startTime===null) startTime=ts;
var elapsed=ts-startTime;
var progress=Math.min(elapsed/duration,1);
drawMorph(progress);
if(progress<1){
requestAnimationFrame(frame);
}else{
morphDone=true;
spark.setAttribute('cx', cx+rightCenterLocal[0]);
spark.setAttribute('cy', cy+rightCenterLocal[1]);
startBlink();
}
}
requestAnimationFrame(frame);

function startBlink(){
var t=0;
function pulse(){
t+=0.05;
var s=1+0.4*Math.sin(t);
spark.setAttribute('r',3.5*s);
spark.setAttribute('opacity', 0.3+0.5*(0.5+0.5*Math.sin(t)));
requestAnimationFrame(pulse);
}
pulse();
}
})();
</script>
