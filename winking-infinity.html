<div style="background:#000; padding:2rem 1rem; display:flex; flex-direction:column; align-items:center; border-radius:12px;">
<svg width="260" height="180" viewBox="0 0 260 180" style="filter:drop-shadow(0 0 6px rgba(51,255,102,0.5));">
<polyline id="infline" fill="none" stroke="#33ff66" stroke-width="2"/>
<circle id="spark" cx="130" cy="90" r="4" fill="#aaffcc"/>
</svg>
</div>
<script>
(function(){
var N=120;
var scale=45;
var infPts=[];
for(var i=0;i<=N;i++){
var t=(i/N)*2*Math.PI;
infPts.push([scale*Math.sin(t), scale*Math.sin(t)*Math.cos(t), 0]);
}
var rightCenter=[27,0,0];

var a=0,b=0;
var infline=document.getElementById('infline');
var spark=document.getElementById('spark');
var t2=0;
function proj(p,cosA,sinA,cosB,sinB){
var x=p[0],y=p[1],z=p[2];
var y1=y*cosA-z*sinA, z1=y*sinA+z*cosA;
var x2=x*cosB-z1*sinB, z2=x*sinB+z1*cosB;
var s=90/(140-z2);
return [130+x2*s,90+y1*s];
}
function tick(){
a+=0.012; b+=0.008;
var cosA=Math.cos(a),sinA=Math.sin(a);
var cosB=Math.cos(b),sinB=Math.sin(b);
var str='';
for(var i=0;i<infPts.length;i++){
var p=proj(infPts[i],cosA,sinA,cosB,sinB);
str+=p[0].toFixed(1)+','+p[1].toFixed(1)+' ';
}
infline.setAttribute('points',str);
var sp=proj(rightCenter,cosA,sinA,cosB,sinB);
spark.setAttribute('cx',sp[0]);
spark.setAttribute('cy',sp[1]);
t2+=0.05;
var s2=1+0.4*Math.sin(t2);
spark.setAttribute('r',3.5*s2);
spark.setAttribute('opacity',0.6+0.4*Math.sin(t2));
requestAnimationFrame(tick);
}
tick();
})();
</script>
