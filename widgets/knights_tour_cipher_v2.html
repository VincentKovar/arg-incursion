<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Tour Cipher v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:24px 16px}
h1{font-size:22px;font-weight:600;color:#c9a84c;text-align:center;margin-bottom:4px;letter-spacing:1px}
.subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:24px}
.card{background:#16213e;border:1px solid #2a2a4a;border-radius:10px;padding:20px;margin-bottom:20px}
label{display:block;font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
textarea{width:100%;background:#0f0f1e;color:#e0e0e0;border:1px solid #3a3a5a;border-radius:6px;padding:10px 12px;font-size:15px;font-family:'Courier New',monospace;resize:vertical;min-height:60px;line-height:1.5}
textarea:focus{outline:none;border-color:#c9a84c}
.char-count{font-size:12px;color:#888;text-align:right;margin-top:4px}
.char-count.over{color:#e05c5c}
.btn{background:#c9a84c;color:#1a1a2e;border:none;border-radius:6px;padding:10px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:12px;letter-spacing:.5px;transition:background .15s}
.btn:hover{background:#e0bf6a}
.btn:disabled{background:#555;color:#888;cursor:not-allowed}
.btn-sm{background:#2a2a4a;color:#c9a84c;font-size:13px;padding:7px 16px;width:auto;margin-top:0;border:1px solid #c9a84c44;border-radius:6px;cursor:pointer;transition:background .15s}
.btn-sm:hover{background:#3a3a5a}
.btn-draw{background:#1e3a2a;color:#5cba7c;border:1px solid #5cba7c44;font-size:13px;padding:7px 16px;border-radius:6px;cursor:pointer;transition:background .15s;margin-top:0;width:auto}
.btn-draw:hover{background:#2a4a36}
/* Opening selector */
.openings{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
.opening-opt{background:#0f0f1e;border:1px solid #3a3a5a;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;text-align:left}
.opening-opt:hover{border-color:#c9a84c88}
.opening-opt.selected{border-color:#c9a84c;background:#1e1a0e}
.opening-opt .sq{font-size:18px;font-weight:700;color:#c9a84c;font-family:'Courier New',monospace}
.opening-opt .name{font-size:11px;color:#888;margin-top:2px}
.opening-opt .side{font-size:10px;color:#555;margin-top:1px}
/* Output */
.section-title{font-size:14px;font-weight:600;color:#c9a84c;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.clue-box{background:#0f0f1e;border:1px solid #c9a84c44;border-radius:6px;padding:12px 16px;font-size:14px;color:#c9a84c;margin-bottom:16px}
.clue-box strong{color:#e0bf6a}
.transcription{font-family:'Courier New',monospace;font-size:16px;line-height:2}
.trans-row{display:flex;gap:2px;margin-bottom:2px}
.trans-cell{width:28px;text-align:center;color:#e0e0e0}
.trans-cell.null-char{color:#444}
.row-label{font-size:11px;color:#555;width:24px;display:flex;align-items:center}
/* Board */
.board-wrap{overflow-x:auto}
.board{display:grid;grid-template-columns:20px repeat(8,1fr);gap:2px;max-width:400px;margin:0 auto}
.file-labels{display:grid;grid-template-columns:20px repeat(8,1fr);gap:2px;max-width:400px;margin:0 auto 4px}
.file-label{text-align:center;font-size:11px;color:#555}
.rank-label{font-size:11px;color:#555;display:flex;align-items:center;justify-content:center}
.sq{aspect-ratio:1;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',monospace;position:relative}
.sq.light{background:#f0d9b5}
.sq.dark{background:#b58863}
.sq .sq-char{font-size:13px;font-weight:700;color:#1a1a2e;line-height:1}
.sq.null-sq .sq-char{color:#1a1a2e66}
.sq .sq-step{font-size:8px;color:#1a1a2e88;line-height:1}
.sq .sq-coord{font-size:8px;color:#1a1a2e66}
.sq.start-sq{box-shadow:inset 0 0 0 2px #c9a84c}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.stat{background:#0f0f1e;border-radius:6px;padding:8px 14px;font-size:13px;flex:1;min-width:90px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:#c9a84c;display:block}
.stat-lbl{color:#666;font-size:11px}
.hidden{display:none}
.row-buttons{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
/* Path drawing canvas */
#pathCanvas{display:block;margin:0 auto;border-radius:6px;background:#0a0a1a;max-width:100%}
.canvas-wrap{text-align:center;margin-top:12px}
/* Print styles */
@media print{
  body{background:#fff;color:#000;padding:0}
  .no-print{display:none!important}
  .card{border:1px solid #ccc;background:#fff}
  .clue-box{border:1px solid #c9a84c;color:#8b6914}
  h1{color:#8b6914}
  .subtitle{color:#666}
  .trans-cell{color:#000}
  .trans-cell.null-char{color:#bbb}
  .row-label{color:#999}
  .section-title{color:#8b6914}
  .stat-val{color:#8b6914}
  .stat-lbl{color:#555}
  .stat{background:#f5f5f5;border:1px solid #ddd}
  .sq.light{background:#f0d9b5}
  .sq.dark{background:#b58863}
  .sq .sq-char,.sq .sq-step,.sq .sq-coord{color:#1a1a2e}
  .sq.null-sq .sq-char{color:#99999966}
}
</style>
</head>
<body>
<h1 class="no-print">♞ Knight's Tour Cipher</h1>
<p class="subtitle no-print">v2 — variable start square</p>

<div class="card no-print">
  <label>Choose your starting square (the key)</label>
  <div class="openings" id="openingPicker"></div>
</div>

<div class="card no-print">
  <label>Your message (max 64 characters)</label>
  <textarea id="msgInput" placeholder="Enter your secret message here..." maxlength="64"></textarea>
  <div class="char-count" id="charCount">0 / 64</div>
  <button class="btn" onclick="encode()">Encode Message</button>
</div>

<div id="output" class="hidden">
  <div class="card">
    <div class="clue-box" id="clueBox"></div>
    <div class="stat-row" id="statRow"></div>
  </div>

  <div class="card">
    <div class="row-buttons">
      <div class="section-title" style="margin-bottom:0">♜ Transcription</div>
      <button class="btn-sm no-print" onclick="copyTranscription()">Copy text</button>
      <button class="btn-sm no-print" onclick="window.print()">Print</button>
    </div>
    <div class="transcription" id="transcription"></div>
  </div>

  <div class="card">
    <div class="row-buttons">
      <div class="section-title" style="margin-bottom:0">♞ Board reference</div>
    </div>
    <div class="board-wrap">
      <div class="file-labels" id="fileLabels"></div>
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="card no-print">
    <div class="row-buttons">
      <div class="section-title" style="margin-bottom:0">⟡ Path drawing</div>
      <button class="btn-draw" onclick="drawPath()">Generate drawing</button>
      <button class="btn-sm" id="savePathBtn" onclick="savePath()" style="display:none">Save image</button>
    </div>
    <p style="font-size:12px;color:#666;margin-bottom:8px">A line drawing of the knight's route — abstract enough to pass as a doodle.</p>
    <div class="canvas-wrap">
      <canvas id="pathCanvas" width="360" height="360"></canvas>
    </div>
  </div>
</div>

<script>
const OPENINGS = [
  {sq:"e4", name:"King's Pawn",    side:"1. e4 (White)", r:3, c:4},
  {sq:"d4", name:"Queen's Pawn",   side:"1. d4 (White)", r:3, c:3},
  {sq:"c4", name:"English",        side:"1. c4 (White)", r:3, c:2},
  {sq:"e5", name:"Open Game",      side:"1...e5 (Black)", r:4, c:4},
  {sq:"c5", name:"Sicilian",       side:"1...c5 (Black)", r:4, c:2},
  {sq:"d5", name:"Queen's Gambit", side:"2...d5 (Black)", r:4, c:3},
  {sq:"g6", name:"King's Indian",  side:"...g6 (Black)", r:5, c:6},
  {sq:"a1", name:"Classic",        side:"Corner start",  r:0, c:0},
];

const FILES = ['a','b','c','d','e','f','g','h'];
const NULL_CHAR = '♘';
let selectedOpening = OPENINGS[7]; // default a1
let currentPath = [];

// Build opening picker
const picker = document.getElementById('openingPicker');
OPENINGS.forEach((o, i) => {
  const div = document.createElement('div');
  div.className = 'opening-opt' + (i === 7 ? ' selected' : '');
  div.innerHTML = `<div class="sq">${o.sq}</div><div class="name">${o.name}</div><div class="side">${o.side}</div>`;
  div.onclick = () => {
    document.querySelectorAll('.opening-opt').forEach(el => el.classList.remove('selected'));
    div.classList.add('selected');
    selectedOpening = o;
  };
  picker.appendChild(div);
});

// Warnsdorff's from any start square
function warnsdorff(startR, startC) {
  function toCoord(r, c) { return FILES[c] + (r + 1); }
  function getMoves(r, c, vis) {
    return [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]
      .map(([dr,dc]) => [r+dr, c+dc])
      .filter(([nr,nc]) => nr>=0&&nr<8&&nc>=0&&nc<8&&!vis[nr*8+nc]);
  }
  const vis = new Array(64).fill(false);
  const path = [];
  let r = startR, c = startC;
  for (let i = 0; i < 64; i++) {
    vis[r*8+c] = true;
    path.push({coord: toCoord(r,c), r, c});
    const moves = getMoves(r, c, vis);
    if (!moves.length) break;
    moves.sort((a,b) => getMoves(a[0],a[1],vis).length - getMoves(b[0],b[1],vis).length);
    [r, c] = moves[0];
  }
  return path.length === 64 ? path : null;
}

const msgInput = document.getElementById('msgInput');
const charCount = document.getElementById('charCount');
msgInput.addEventListener('input', () => {
  const len = msgInput.value.length;
  charCount.textContent = `${len} / 64`;
  charCount.className = 'char-count' + (len > 64 ? ' over' : '');
});

function encode() {
  const raw = msgInput.value.slice(0, 64);
  if (!raw.trim()) return;

  const o = selectedOpening;
  const path = warnsdorff(o.r, o.c);
  if (!path) { alert('Tour generation failed for this start square. Try another.'); return; }
  currentPath = path;

  const padded = raw.padEnd(64, NULL_CHAR);

  // boardMap[rank][file]
  const boardMap = {};
  for (let rank = 1; rank <= 8; rank++) {
    boardMap[rank] = {};
    FILES.forEach(f => boardMap[rank][f] = null);
  }
  path.forEach(({coord, r, c}, i) => {
    const file = FILES[c];
    const rank = r + 1;
    boardMap[rank][file] = {char: padded[i], step: i+1, isNull: padded[i] === NULL_CHAR, isStart: i === 0};
  });

  // Clue box
  document.getElementById('clueBox').innerHTML =
    `<strong>Opening key:</strong> ${o.name} &nbsp;|&nbsp; <strong>Starting square:</strong> ${o.sq.toUpperCase()} &nbsp;|&nbsp; Follow knight's L-moves in sequence to read the message.`;

  // Stats
  const nullCount = 64 - raw.length;
  document.getElementById('statRow').innerHTML = `
    <div class="stat"><span class="stat-val">${raw.length}</span><span class="stat-lbl">message chars</span></div>
    <div class="stat"><span class="stat-val">${nullCount}</span><span class="stat-lbl">filler knights</span></div>
    <div class="stat"><span class="stat-val">64</span><span class="stat-lbl">total squares</span></div>
    <div class="stat"><span class="stat-val">${o.sq.toUpperCase()}</span><span class="stat-lbl">start (${o.name})</span></div>`;

  // Transcription (rank 8→1, files a-h)
  const transEl = document.getElementById('transcription');
  transEl.innerHTML = '';
  let plainText = `Knight's Tour Cipher\nKey: ${o.name} (${o.sq.toUpperCase()})\n\n`;
  for (let rank = 8; rank >= 1; rank--) {
    const row = document.createElement('div');
    row.className = 'trans-row';
    const rl = document.createElement('div');
    rl.className = 'row-label';
    rl.textContent = rank;
    row.appendChild(rl);
    let rowText = '';
    FILES.forEach(f => {
      const cell = document.createElement('div');
      const sq = boardMap[rank][f];
      cell.className = 'trans-cell' + (sq && sq.isNull ? ' null-char' : '');
      cell.textContent = sq ? sq.char : '?';
      row.appendChild(cell);
      rowText += sq ? sq.char : '?';
    });
    transEl.appendChild(row);
    plainText += `${rank}  ${rowText}\n`;
  }
  plainText += `\n   abcdefgh\n\nStart: ${o.sq.toUpperCase()} (${o.name})\nFollow knight's L-moves in sequence.`;
  transEl.dataset.plain = plainText;

  // File labels row
  document.getElementById('fileLabels').innerHTML =
    '<div></div>' + FILES.map(f => `<div class="file-label">${f}</div>`).join('');

  // Board
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let rank = 8; rank >= 1; rank--) {
    const rl = document.createElement('div');
    rl.className = 'rank-label';
    rl.textContent = rank;
    boardEl.appendChild(rl);
    FILES.forEach((f, fi) => {
      const isLight = (rank + fi) % 2 === 0;
      const sq = boardMap[rank][f];
      const div = document.createElement('div');
      div.className = `sq ${isLight?'light':'dark'}${sq&&sq.isNull?' null-sq':''}${sq&&sq.isStart?' start-sq':''}`;
      if (sq) div.innerHTML = `<div class="sq-step">${sq.step}</div><div class="sq-char">${sq.char}</div><div class="sq-coord">${f}${rank}</div>`;
      boardEl.appendChild(div);
    });
  }

  // Reset canvas
  const canvas = document.getElementById('pathCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('savePathBtn').style.display = 'none';

  document.getElementById('output').classList.remove('hidden');
  document.getElementById('output').scrollIntoView({behavior:'smooth'});
}

function copyTranscription() {
  const text = document.getElementById('transcription').dataset.plain;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy text', 1500);
  });
}

function drawPath() {
  if (!currentPath.length) return;
  const canvas = document.getElementById('pathCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = 24;
  const cellW = (W - pad*2) / 8;
  const cellH = (H - pad*2) / 8;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Convert path step to canvas coords (center of cell)
  // rank 1 = row index 0 from bottom → canvas y flipped
  function toXY(r, c) {
    const x = pad + c * cellW + cellW / 2;
    const y = pad + (7 - r) * cellH + cellH / 2;
    return [x, y];
  }

  // Draw line segments with gradient gold→teal
  for (let i = 0; i < currentPath.length - 1; i++) {
    const [x1, y1] = toXY(currentPath[i].r, currentPath[i].c);
    const [x2, y2] = toXY(currentPath[i+1].r, currentPath[i+1].c);
    const t = i / (currentPath.length - 1);
    // interpolate #c9a84c → #5cba7c
    const r = Math.round(201 + (92 - 201) * t);
    const g = Math.round(168 + (186 - 168) * t);
    const b = Math.round(76 + (124 - 76) * t);
    ctx.beginPath();
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.7;
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Draw dots at each square
  currentPath.forEach(({r, c}, i) => {
    const [x, y] = toXY(r, c);
    const t = i / 63;
    const dr = Math.round(201 + (92 - 201) * t);
    const dg = Math.round(168 + (186 - 168) * t);
    const db = Math.round(76 + (124 - 76) * t);
    ctx.beginPath();
    ctx.arc(x, y, i === 0 ? 4 : 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${dr},${dg},${db})`;
    ctx.fill();
  });

  // Mark start with a small ring
  const [sx, sy] = toXY(currentPath[0].r, currentPath[0].c);
  ctx.beginPath();
  ctx.arc(sx, sy, 7, 0, Math.PI * 2);
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  document.getElementById('savePathBtn').style.display = 'inline-block';
}

function savePath() {
  const canvas = document.getElementById('pathCanvas');
  const a = document.createElement('a');
  a.download = 'knights-path.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
